<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 385 130" role="img" aria-label="JUICE">
  <!--
    Pitch-deck variant of juice-wordmark.svg.
    Differences:
      1. Bolt path shifted +10 units to the right so the "U" has more breathing room.
      2. SMIL <animate> on the bolt — gentle opacity breathing (0.78 ↔ 1)
         that plays automatically whenever the SVG is loaded via <img>.
    Used only by /pitch.html. The main site keeps juice-wordmark.svg.
  -->
  <defs>
    <!-- High-contrast polished-metal gradient. Alternating bright
         highlights and dark shadows give the wordmark depth and
         simulate light catching a 3D metallic surface — applied
         diagonally so the highlight band sweeps across the letters. -->
    <linearGradient id="juice-olive-metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fbffe0"/>
      <stop offset="15%" stop-color="#d4e87a"/>
      <stop offset="34%" stop-color="#5a7a18"/>
      <stop offset="50%" stop-color="#fbffe8"/>
      <stop offset="66%" stop-color="#5a7a18"/>
      <stop offset="85%" stop-color="#d4e87a"/>
      <stop offset="100%" stop-color="#fbffe0"/>
    </linearGradient>
    <!-- 'Cool' variant: same metallic structure but the lower-shadow
         stop swaps olive for a blue gleam (#6db8e0), giving the "CE"
         letters a cool-tinted reflection like polished steel. -->
    <linearGradient id="juice-olive-metal-cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fbffe0"/>
      <stop offset="15%" stop-color="#d4e87a"/>
      <stop offset="34%" stop-color="#5a7a18"/>
      <stop offset="50%" stop-color="#fbffe8"/>
      <stop offset="66%" stop-color="#6db8e0"/>
      <stop offset="85%" stop-color="#d4e87a"/>
      <stop offset="100%" stop-color="#fbffe0"/>
    </linearGradient>
    <!-- Bolt: pearlescent white-to-lime metal — preserves the bolt as
         the brand accent while keeping it metallic, not flat white. -->
    <linearGradient id="juice-bolt-metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#f4ffb8"/>
      <stop offset="55%"  stop-color="#a8db3a"/>
      <stop offset="78%"  stop-color="#f4ffb8"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <text x="8" y="105" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="120" font-weight="900" fill="url(#juice-olive-metal)" letter-spacing="-4">JU</text>
  <path d="M 214 12 L 166 76 L 194 76 L 181 113 L 227 63 L 200 63 Z" fill="url(#juice-bolt-metal)" stroke-linejoin="round">
    <animate
      attributeName="opacity"
      values="0.85;1;0.85"
      keyTimes="0;0.5;1"
      dur="4.5s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" />
  </path>
  <text x="238" y="105" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="120" font-weight="900" fill="url(#juice-olive-metal-cool)" letter-spacing="0">CE</text>
</svg>
