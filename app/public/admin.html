<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juice — Painel da Equipe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0F1E;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#0d1421;border:1px solid #1a2535;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%}
.login-card h2{color:#00FF88;font-size:20px;margin-bottom:8px}
.login-card p{color:#8a9a8a;font-size:14px;margin-bottom:28px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#0A0F1E;border:none;border-radius:10px;padding:14px 24px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s}
.google-btn:hover{background:#f0f0f0}
.google-btn img{width:20px;height:20px}

/* App */
#app-screen{display:none}
header{background:#0d1421;border-bottom:1px solid #1a2535;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo h1{font-size:16px;font-weight:700;color:#00FF88}
.logo p{font-size:11px;color:#8a9a8a}
.user-info{display:flex;align-items:center;gap:12px}
.user-email{font-size:13px;color:#8a9a8a}
.logout-btn{border:1px solid #1a2535;color:#8a9a8a;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;background:transparent;transition:.2s}
.logout-btn:hover{border-color:#ff4d4d;color:#ff4d4d}

/* Nav tabs */
nav.tabs{background:#0d1421;border-bottom:1px solid #1a2535;padding:0 28px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:55px;z-index:9}
nav.tabs a{padding:12px 16px;font-size:13px;color:#8a9a8a;text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
nav.tabs a:hover{color:#fff}
nav.tabs a.active{color:#00FF88;border-bottom-color:#00FF88}
nav.tabs a .tag{font-size:9px;background:#1a2535;color:#8a9a8a;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:1px}

main{max-width:1200px;margin:0 auto;padding:24px}

/* Cards */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.card{background:#0d1421;border:1px solid #1a2535;border-radius:14px;padding:18px}
.card.g{border-top:3px solid #00FF88}
.card.p{border-top:3px solid #9945FF}
.card.y{border-top:3px solid #FFB800}
.card.r{border-top:3px solid #ff4d4d}
.card-label{font-size:11px;color:#8a9a8a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card-value{font-size:26px;font-weight:700}
.card-value.green{color:#00FF88}
.card-value.purple{color:#9945FF}
.card-value.yellow{color:#FFB800}
.card-value.red{color:#ff4d4d}

/* Sections */
.section{margin-bottom:28px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.section-title{font-size:15px;font-weight:600}
.count-badge{font-size:12px;background:#1a2535;padding:3px 10px;border-radius:10px;color:#8a9a8a}

/* Tables */
.table-wrap{background:#0d1421;border:1px solid #1a2535;border-radius:14px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
thead th{text-align:left;padding:10px 14px;font-size:11px;color:#8a9a8a;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1a2535;background:#0d1421}
tbody tr{border-bottom:1px solid #111827;transition:.15s}
tbody tr:hover{background:#111827}
tbody td{padding:11px 14px;font-size:13px}
.empty{text-align:center;padding:36px;color:#8a9a8a;font-size:13px}

/* Status badges */
.status-badge{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.status-pendente{background:#2a1500;color:#FFB800}
.status-processado{background:#0d1f0d;color:#00FF88}
.status-confirmado{background:#0d1f0d;color:#00FF88}
.status-bloqueado{background:#2a0d0d;color:#ff4d4d}
.status-rejeitado{background:#2a0d0d;color:#ff4d4d}

/* Buttons */
.btn-small{border:none;padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;transition:.2s}
.btn-ok{background:#0d1f0d;color:#00FF88;border:1px solid #00FF88}
.btn-ok:hover{background:#00FF88;color:#0A0F1E}
.btn-danger{background:#2a0d0d;color:#ff4d4d;border:1px solid #ff4d4d}
.btn-danger:hover{background:#ff4d4d;color:#0A0F1E}

.proof-link{color:#9945FF;font-size:12px}
.proof-link:hover{text-decoration:underline}
.wallet-addr{font-family:monospace;font-size:12px;color:#8a9a8a}

#lastUpdate{font-size:11px;color:#555;text-align:right;margin-top:20px}

footer{text-align:center;padding:20px;font-size:12px;color:#555;border-top:1px solid #1a2535;margin-top:16px}
footer a{color:#8a9a8a}
footer a:hover{color:#00FF88}

/* Loader */
.module-loader{text-align:center;padding:60px 20px;color:#8a9a8a;font-size:13px}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h2>🔐 Painel da Equipe</h2>
    <p>Acesso restrito à equipe Juice</p>
    <button class="google-btn" id="btn-login">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Entrar com Google
    </button>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <header>
    <div class="logo">
      <h1>⚡ Juice — Painel da Equipe</h1>
      <p>Dashboard privado · acesso restrito</p>
    </div>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="logout-btn" id="btn-logout">Sair</button>
      <a href="/" style="font-size:13px;color:#8a9a8a;margin-left:8px">← Público</a>
    </div>
  </header>

  <nav class="tabs" id="nav">
    <a href="#overview">📊 Overview</a>
    <a href="#saques">💰 Saques</a>
    <a href="#compras">💵 Compras</a>
    <a href="#usuarios">👥 Usuários</a>
    <a href="#banners">📢 Banners</a>
    <a href="#push">📨 Push</a>
    <a href="#waitlist">🎁 Waitlist</a>
    <a href="#analytics">📈 Analytics</a>
    <a href="#fraude">🚫 Antifraude</a>
    <a href="#bot">🤖 Bot</a>
  </nav>

  <main id="module-container">
    <div class="module-loader">Carregando…</div>
  </main>

  <footer>
    <p>
      Painel privado Juice &middot;
      <a href="https://console.firebase.google.com/project/cnbmobile-2053c" target="_blank">Firebase Console</a>
      &middot;
      <a href="https://solscan.io/token/Ew92cAS3PmGqeNvUjsDCwHoVsiGeLSynFnzpdLTx2pu4" target="_blank">Token Solscan</a>
    </p>
  </footer>
</div>

<script type="module">
import { auth, ADMIN_EMAIL } from './admin/lib/firebase.js';
import { GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

const provider = new GoogleAuthProvider();

// Login / logout
document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
document.getElementById('btn-logout').onclick = () => { signOut(auth); cleanupActiveModule(); };

// Roteador hash-based
const MODULOS = {
  overview:  () => import('./admin/overview.js'),
  saques:    () => import('./admin/saques.js'),
  compras:   () => import('./admin/compras.js'),
  usuarios:  () => import('./admin/usuarios.js'),
  banners:   () => import('./admin/banners.js'),
  push:      () => import('./admin/push.js'),
  waitlist:  () => import('./admin/waitlist.js'),
  analytics: () => import('./admin/analytics.js'),
  fraude:    () => import('./admin/fraude.js'),
  bot:       () => import('./admin/bot.js'),
};

let unsubsAtivos = [];
function cleanupActiveModule() {
  for (const u of unsubsAtivos) { try { u(); } catch (e) { console.error('cleanup falhou:', e); } }
  unsubsAtivos = [];
}

async function carregarModulo(nome) {
  if (!MODULOS[nome]) nome = 'overview';
  // marca tab ativa
  document.querySelectorAll('#nav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + nome);
  });
  // cleanup anterior
  cleanupActiveModule();
  const container = document.getElementById('module-container');
  container.innerHTML = '<div class="module-loader">Carregando…</div>';
  try {
    const mod = await MODULOS[nome]();
    container.innerHTML = '';
    await mod.init({
      container,
      registerCleanup: (fn) => { if (typeof fn === 'function') unsubsAtivos.push(fn); },
    });
  } catch (e) {
    console.error('Falha ao carregar módulo', nome, e);
    container.innerHTML = `<div class="empty">❌ Falha ao carregar módulo "${nome}". Ver console.</div>`;
  }
}

function rotaAtual() {
  // suporta "#usuarios?uid=X" → retorna "usuarios"
  const raw = location.hash.replace('#', '') || 'overview';
  return raw.split('?')[0].toLowerCase();
}

window.addEventListener('hashchange', () => carregarModulo(rotaAtual()));

// Auth gate
onAuthStateChanged(auth, user => {
  if (!user) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    return;
  }
  if (user.email !== ADMIN_EMAIL) {
    signOut(auth);
    alert('Acesso negado. Este painel é restrito à equipe Juice.');
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-email').textContent = user.email;
  carregarModulo(rotaAtual());
});
</script>
</body>
</html>
