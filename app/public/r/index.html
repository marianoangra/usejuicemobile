<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CNB Mobile — Indicação</title>
<style>
  html,body{margin:0;padding:0;background:#0A0F1E;color:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;height:100%}
  .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px;text-align:center}
  h1{font-size:22px;margin:0 0 8px;color:#c6ff4a}
  p{color:#a8b3a8;font-size:15px;line-height:22px;margin:0 0 24px}
  .code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:18px;letter-spacing:2px;padding:10px 18px;border:1px solid #c6ff4a44;border-radius:10px;color:#c6ff4a;margin-bottom:20px}
  .btn{background:#c6ff4a;color:#0A0F1E;font-weight:700;padding:14px 28px;border-radius:12px;text-decoration:none;font-size:16px}
  .small{font-size:12px;color:#6c7a6c;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Você foi indicado pro CNB Mobile</h1>
  <p>Estamos te redirecionando para a loja…</p>
  <div class="code" id="code">—</div>
  <a class="btn" id="manual" href="#">Abrir loja</a>
  <p class="small">Se não abrir automaticamente, toque no botão acima.</p>
</div>
<script>
(function(){
  var ANDROID_PKG = 'com.cnb.cnbappv2';
  var IOS_ID = '6741577961';

  function getCode(){
    var path = location.pathname.replace(/^\/r\/?/, '').replace(/\/$/, '');
    var q = new URLSearchParams(location.search).get('c') || '';
    var raw = (path || q || '').toUpperCase().trim();
    return /^[A-Z0-9]{1,10}$/.test(raw) ? raw : '';
  }

  var code = getCode();
  document.getElementById('code').textContent = code || '—';

  var ua = navigator.userAgent || '';
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /Android/.test(ua);

  var dest;
  if (isAndroid) {
    dest = 'https://play.google.com/store/apps/details?id=' + ANDROID_PKG +
           (code ? '&referrer=' + encodeURIComponent(code) : '');
  } else if (isIOS) {
    dest = 'https://apps.apple.com/app/id' + IOS_ID;
    if (code) {
      try { navigator.clipboard && navigator.clipboard.writeText(code); } catch(e){}
    }
  } else {
    dest = 'https://cnbmobile.com';
  }

  document.getElementById('manual').href = dest;
  setTimeout(function(){ location.replace(dest); }, isIOS ? 1200 : 600);
})();
</script>
</body>
</html>
